<html>
    <head>
        <title>Tiêu đề trang</title>
    </head>
    <body>
        <form name="colorForm">
        <h3>
            select background color:
        </h3>
        <select id="colorSelect" name="colorSelect" size="5" onchange="colorForm.selectedColor.value=this.value;colorForm.selectedColor.style.background=this.value;">
            <option value="Red">Red</option>
            <option value="lightyellow">lightyellow</option>
            <option value="lightblue">lightblue</option>
            <option value="lightgreen">lightgreen</option>
            <option value="lightpink">lightpink</option>
            <option value="lightgray">lightgray</option>
        </select>
        <p>Your selected color is:</p>
        <input type="text" id="selectedColor" name="selectedColor" >
    </form>
    <form name="imgForm">
        <select id="imageSelect" name="imageSelect" size="5" onchange="imgForm.selectedImage.src=this.value;">
            <option value="images/logo_uel.png">Logo UEL</option>
            <option value="images/logo_vng.png">Logo VNG</option>
            <option value="images/ad.png">Bản mặt tui</option>
        </select>
        <p>Your selected image is:</p>
        <img id="selectedImage" name="selectedImage" alt="No image selcted"
                style="width:200px;height:200px;">
    </form>
    </body>
</html>
