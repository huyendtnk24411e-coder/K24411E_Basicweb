<html lang="vi">
<head>
    <title>UEL Student ID Card Flip</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            align-items:center;
           
        }

        /* STEP 1: Khung chứa thẻ */
        .card-container{
            perspective:1000px;
        }

        /* Link bao toàn bộ card */
        .card-link{
            text-decoration:none;
        }

        /* Card chính */
        .student-card{
            width:300px;
            height:480px;
            position:relative;
            transform-style:preserve-3d;
            transition:transform 0.8s ease;
            cursor:pointer;
        }

        /* STEP 2: Hover để lật */
        .card-container:hover .student-card{
            transform:rotateY(180deg);
        }

        /* Hai mặt của thẻ */
        .card-face{
            position:absolute;
            width:100%;
            height:100%;
            border-radius:20px;
            overflow:hidden;
            backface-visibility:hidden;
            box-shadow:0 15px 30px rgba(0,0,0,0.25);
        }

        /* Ảnh hiển thị full card */
        .card-face img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        /* Mặt sau */
        .card-back{
            transform:rotateY(180deg);
        }
    </style>
</head>
<body>

    <!-- STEP 3: Click để mở website -->
    <div class="card-container">
        <a href="https://is.uel.edu.vn" target="_blank" class="card-link">
            <div class="student-card">

                <!-- Mặt trước mặc định -->
                <div class="card-face card-front">
                    <img src="image/mt.jpg" alt="Mặt trước thẻ sinh viên">
                </div>

                <!-- Mặt sau khi hover -->
                <div class="card-face card-back">
                    <img src="image/ms.jpg" alt="Mặt sau thẻ sinh viên">
                </div>

            </div>
        </a>
    </div>

</body>
</html>
